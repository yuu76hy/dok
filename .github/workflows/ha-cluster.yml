# 最终使用说明（一次配置，永久运行）
1. 在 GitHub 仓库创建 2 个密钥：
   - `TAILSCALE_AUTH_KEY`
   - `CLUSTER_SSH_PASS`
2. 把 5 个文件放入 `.github/workflows/`
3. **手动错峰启动**：
   - 启动 node1 → 等 72 分钟 → 启动 node2
   - 再等 72 分钟 → node3 → node4 → node5
4. 之后全部**自动续跑、自动组网、自动容错**
